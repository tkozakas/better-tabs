<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Tab bar background -->
  <rect x="18" y="36" width="92" height="72" rx="8" fill="#fff" opacity="0.15"/>
  <!-- Active tab -->
  <rect x="22" y="28" width="34" height="12" rx="5 5 0 0" fill="#fff"/>
  <!-- Inactive tabs -->
  <rect x="60" y="30" width="24" height="10" rx="4 4 0 0" fill="#fff" opacity="0.4"/>
  <rect x="88" y="30" width="18" height="10" rx="4 4 0 0" fill="#fff" opacity="0.25"/>
  <!-- Page content area -->
  <rect x="22" y="40" width="84" height="64" rx="0 0 6 6" fill="#fff" opacity="0.92"/>
  <!-- Content lines -->
  <rect x="30" y="50" width="40" height="4" rx="2" fill="#3b82f6" opacity="0.5"/>
  <rect x="30" y="60" width="60" height="4" rx="2" fill="#3b82f6" opacity="0.3"/>
  <rect x="30" y="70" width="50" height="4" rx="2" fill="#3b82f6" opacity="0.3"/>
  <rect x="30" y="80" width="55" height="4" rx="2" fill="#3b82f6" opacity="0.2"/>
  <rect x="30" y="90" width="35" height="4" rx="2" fill="#3b82f6" opacity="0.2"/>
</svg>
