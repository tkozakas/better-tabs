<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      width: 340px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      font-size: 14px;
      background: #0d1117;
      color: #e6edf3;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }
    .header svg { width: 24px; height: 24px; fill: #58a6ff; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .btn { 
      width: 100%; 
      padding: 10px 16px; 
      margin: 5px 0; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
    .primary { background: #238636; color: white; }
    .primary:hover { background: #2ea043; }
    .secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .secondary:hover { background: #30363d; }
    .danger { background: transparent; color: #f85149; border: 1px solid #f8514933; }
    .danger:hover { background: #f8514922; }
    .hidden { display: none; }
    .divider {
      height: 1px;
      background: #30363d;
      margin: 16px 0;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn-row .btn {
      flex: 1;
      justify-content: center;
    }
    .site-list {
      max-height: 200px;
      overflow-y: auto;
    }
    .site-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      margin: 4px 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 13px;
    }
    .site-item .domain {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .site-item .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .site-item .status-dot.ok { background: #3fb950; }
    .site-item .status-dot.error { background: #f85149; }
    .site-item .status-dot.pending { background: #8b949e; }
    .site-item .remove-btn {
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      padding: 2px;
      font-size: 16px;
      line-height: 1;
    }
    .site-item .remove-btn:hover { color: #f85149; }
    .site-item .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      font-size: 14px;
      line-height: 1;
    }
    .empty-state {
      color: #8b949e;
      font-size: 13px;
      text-align: center;
      padding: 16px 0;
    }
    .settings-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      font-size: 13px;
      color: #8b949e;
    }
    .settings-row label { flex: 1; }
    .settings-row select, .settings-row input[type="number"] {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #e6edf3;
      padding: 4px 8px;
      font-size: 13px;
      width: 70px;
    }
    .settings-row input[type="checkbox"] {
      accent-color: #238636;
    }
    .ping-info {
      font-size: 11px;
      color: #6e7681;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    <h1>Better Tabs</h1>
  </div>
  
  <div class="section">
    <div class="section-title">Tab Actions</div>
    <div class="btn-row">
      <button class="btn secondary" id="group-btn" title="Group by Domain">
        <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h8v8h-8v-8zm2 2v4h4v-4h-4z"/></svg>
        Group
      </button>
      <button class="btn secondary" id="ungroup-btn" title="Ungroup All">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
        Ungroup
      </button>
    </div>
    <div class="btn-row">
      <button class="btn secondary" id="sort-btn" title="Sort Alphabetically">
        <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
        Sort
      </button>
      <button class="btn secondary" id="close-dupes-btn" title="Close Duplicates">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        Dedupe
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">Session Keepalive</div>
    <button class="btn primary" id="protect-btn">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      Protect Current Site
    </button>
    <button class="btn secondary" id="ping-now-btn" title="Ping all protected sites now">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      Ping Now
    </button>
    <div class="site-list" id="site-list"></div>

    <div class="settings-row">
      <label for="interval-select">Ping interval</label>
      <select id="interval-select">
        <option value="1">1 min</option>
        <option value="2">2 min</option>
        <option value="5" selected>5 min</option>
        <option value="10">10 min</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
      </select>
    </div>
    <div class="settings-row">
      <label for="open-tab-check">Only if tab is open</label>
      <input type="checkbox" id="open-tab-check" checked>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
