<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      width: 300px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      font-size: 14px;
      background: #0d1117;
      color: #e6edf3;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }
    .header svg { width: 24px; height: 24px; fill: #58a6ff; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .btn { 
      width: 100%; 
      padding: 10px 16px; 
      margin: 6px 0; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .primary { background: #238636; color: white; }
    .primary:hover { background: #2ea043; }
    .secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .secondary:hover { background: #30363d; }
    .danger { background: transparent; color: #f85149; border: 1px solid #f8514933; margin-top: 12px; }
    .danger:hover { background: #f8514922; }
    .status { 
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px; 
      margin-bottom: 12px; 
      border-radius: 6px; 
      background: #161b22;
      border: 1px solid #30363d;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }
    .status-dot.offline { background: #f85149; }
    .code { 
      font-family: 'SF Mono', Consolas, monospace; 
      font-size: 24px; 
      letter-spacing: 4px; 
      text-align: center; 
      padding: 20px; 
      background: #161b22; 
      border: 1px solid #30363d;
      border-radius: 6px; 
      margin: 16px 0;
      color: #58a6ff;
    }
    .hidden { display: none; }
    .info { 
      color: #8b949e; 
      font-size: 13px; 
      text-align: center;
      margin: 12px 0;
    }
    .btn-group { margin-top: 8px; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 16 16"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
    <h1>Tab Grouper</h1>
  </div>
  
  <div id="login-view" class="hidden">
    <p class="info">Connect your GitHub account to sync your pull requests as browser tabs.</p>
    <button class="btn primary" id="login-btn">Login with GitHub</button>
  </div>
  
  <div id="code-view" class="hidden">
    <p class="info">Enter this code on GitHub:</p>
    <div class="code" id="user-code"></div>
    <p class="info">Waiting for authorization...</p>
  </div>
  
  <div id="main-view" class="hidden">
    <div class="status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status">Loading...</span>
    </div>
    
    <div class="btn-group">
      <button class="btn secondary" id="refresh-btn">Refresh PRs</button>
      <button class="btn secondary" id="group-btn">Group Tabs by Domain</button>
    </div>
    
    <button class="btn danger" id="logout-btn">Logout</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
