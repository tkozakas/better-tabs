<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      width: 320px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      font-size: 14px;
      background: #0d1117;
      color: #e6edf3;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }
    .header svg { width: 24px; height: 24px; fill: #58a6ff; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .btn { 
      width: 100%; 
      padding: 10px 16px; 
      margin: 5px 0; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
    .primary { background: #238636; color: white; }
    .primary:hover { background: #2ea043; }
    .secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .secondary:hover { background: #30363d; }
    .danger { background: transparent; color: #f85149; border: 1px solid #f8514933; }
    .danger:hover { background: #f8514922; }
    .status { 
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px; 
      margin-bottom: 8px; 
      border-radius: 6px; 
      background: #161b22;
      border: 1px solid #30363d;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
    }
    .code { 
      font-family: 'SF Mono', Consolas, monospace; 
      font-size: 24px; 
      letter-spacing: 4px; 
      text-align: center; 
      padding: 20px; 
      background: #161b22; 
      border: 1px solid #30363d;
      border-radius: 6px; 
      margin: 16px 0;
      color: #58a6ff;
    }
    .hidden { display: none; }
    .info { 
      color: #8b949e; 
      font-size: 13px; 
      text-align: center;
      margin: 12px 0;
    }
    .divider {
      height: 1px;
      background: #30363d;
      margin: 16px 0;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    .btn-row .btn {
      flex: 1;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h-2v3h-3v2h3v3h2v-3h3v-2h-3v-3z"/></svg>
    <h1>Tab Grouper</h1>
  </div>
  
  <div class="section">
    <div class="section-title">Tab Actions</div>
    <div class="btn-row">
      <button class="btn secondary" id="group-btn" title="Group by Domain">
        <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h8v8h-8v-8zm2 2v4h4v-4h-4z"/></svg>
        Group
      </button>
      <button class="btn secondary" id="ungroup-btn" title="Ungroup All">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
        Ungroup
      </button>
    </div>
    <div class="btn-row">
      <button class="btn secondary" id="sort-btn" title="Sort Alphabetically">
        <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
        Sort
      </button>
      <button class="btn secondary" id="close-dupes-btn" title="Close Duplicates">
        <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        Dedupe
      </button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">GitHub</div>
    
    <div id="github-login">
      <button class="btn primary" id="login-btn">
        <svg viewBox="0 0 16 16"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
        Connect GitHub
      </button>
    </div>

    <div id="github-code" class="hidden">
      <p class="info">Code copied to clipboard!</p>
      <div class="code" id="user-code"></div>
      <p class="info">Paste it on the GitHub page</p>
    </div>
    
    <div id="github-connected" class="hidden">
      <div class="status">
        <span class="status-dot"></span>
        <span id="status">Connected</span>
      </div>
      <button class="btn secondary" id="my-prs-btn">
        <svg viewBox="0 0 16 16"><path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354ZM3.75 2.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm0 9.5a.75.75 0 1 0 0 1.5.75.75 0 0 0 0-1.5Zm8.25.75a.75.75 0 1 0 1.5 0 .75.75 0 0 0-1.5 0Z"/></svg>
        My PRs
      </button>
      <button class="btn secondary" id="review-prs-btn">
        <svg viewBox="0 0 16 16"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0 1 14.25 13H8.06l-2.573 2.573A1.458 1.458 0 0 1 3 14.543V13H1.75A1.75 1.75 0 0 1 0 11.25Zm1.75-.25a.25.25 0 0 0-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h6.5a.25.25 0 0 0 .25-.25v-9.5a.25.25 0 0 0-.25-.25Zm7 2.25v2.5a.75.75 0 0 1-1.5 0v-2.5a.75.75 0 0 1 1.5 0ZM9 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/></svg>
        Review Requests
      </button>
      <button class="btn secondary" id="my-issues-btn">
        <svg viewBox="0 0 16 16"><path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"/></svg>
        My Issues
      </button>
      <button class="btn secondary" id="notifications-btn">
        <svg viewBox="0 0 16 16"><path d="M8 16a2 2 0 0 0 1.985-1.75c.017-.137-.097-.25-.235-.25h-3.5c-.138 0-.252.113-.235.25A2 2 0 0 0 8 16ZM3 5a5 5 0 0 1 10 0v2.947c0 .05.015.098.042.139l1.703 2.555A1.519 1.519 0 0 1 13.482 13H2.518a1.516 1.516 0 0 1-1.263-2.36l1.703-2.554A.255.255 0 0 0 3 7.947Zm5-3.5A3.5 3.5 0 0 0 4.5 5v2.947c0 .346-.102.683-.294.97l-1.703 2.556a.017.017 0 0 0-.003.01l.001.006c0 .002.002.004.004.006l.006.004.007.001h10.964l.007-.001.006-.004.004-.006.001-.007a.017.017 0 0 0-.003-.01l-1.703-2.554a1.745 1.745 0 0 1-.294-.97V5A3.5 3.5 0 0 0 8 1.5Z"/></svg>
        Notifications
      </button>
      <button class="btn danger" id="logout-btn">Disconnect</button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
