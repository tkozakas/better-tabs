<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      width: 320px; 
      padding: 16px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      font-size: 14px;
      background: #0d1117;
      color: #e6edf3;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #30363d;
    }
    .header svg { width: 24px; height: 24px; fill: #58a6ff; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .btn { 
      width: 100%; 
      padding: 10px 16px; 
      margin: 6px 0; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn svg { width: 16px; height: 16px; fill: currentColor; }
    .primary { background: #238636; color: white; }
    .primary:hover { background: #2ea043; }
    .secondary { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
    .secondary:hover { background: #30363d; }
    .danger { background: transparent; color: #f85149; border: 1px solid #f8514933; }
    .danger:hover { background: #f8514922; }
    .status { 
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px; 
      margin-bottom: 8px; 
      border-radius: 6px; 
      background: #161b22;
      border: 1px solid #30363d;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }
    .status-dot.offline { background: #f85149; }
    .status-dot.warning { background: #d29922; }
    .code { 
      font-family: 'SF Mono', Consolas, monospace; 
      font-size: 24px; 
      letter-spacing: 4px; 
      text-align: center; 
      padding: 20px; 
      background: #161b22; 
      border: 1px solid #30363d;
      border-radius: 6px; 
      margin: 16px 0;
      color: #58a6ff;
    }
    .hidden { display: none; }
    .info { 
      color: #8b949e; 
      font-size: 13px; 
      text-align: center;
      margin: 12px 0;
    }
    .divider {
      height: 1px;
      background: #30363d;
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13-2h-2v3h-3v2h3v3h2v-3h3v-2h-3v-3z"/></svg>
    <h1>Tab Grouper</h1>
  </div>
  
  <div class="section">
    <div class="section-title">Tab Actions</div>
    <button class="btn secondary" id="group-btn">
      <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm8-2h8v8h-8v-8zm2 2v4h4v-4h-4z"/></svg>
      Group by Domain
    </button>
    <button class="btn secondary" id="ungroup-btn">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10H7v-2h10v2z"/></svg>
      Ungroup All
    </button>
    <button class="btn secondary" id="sort-btn">
      <svg viewBox="0 0 24 24"><path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z"/></svg>
      Sort Alphabetically
    </button>
    <button class="btn secondary" id="close-dupes-btn">
      <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      Close Duplicates
    </button>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-title">GitHub Integration</div>
    
    <div id="github-login" class="hidden">
      <button class="btn primary" id="login-btn">
        <svg viewBox="0 0 16 16"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/></svg>
        Connect GitHub
      </button>
    </div>

    <div id="github-code" class="hidden">
      <p class="info">Enter this code on GitHub:</p>
      <div class="code" id="user-code"></div>
      <p class="info">Waiting for authorization...</p>
    </div>
    
    <div id="github-connected" class="hidden">
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status">Connected</span>
      </div>
      <button class="btn secondary" id="refresh-btn">
        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Sync PRs Now
      </button>
      <button class="btn danger" id="logout-btn">Disconnect</button>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
