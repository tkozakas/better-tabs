<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 520" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <!-- Window frame -->
  <rect width="372" height="520" rx="12" fill="#1a1f26" stroke="#30363d" stroke-width="1"/>

  <!-- Body -->
  <g transform="translate(16,16)">
    <!-- Header -->
    <g>
      <circle cx="12" cy="12" r="10" fill="#238636"/>
      <path d="M7 12l3 3 6-6" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="30" y="17" fill="#e6edf3" font-size="16" font-weight="600">Better Tabs</text>
    </g>
    <line x1="0" y1="36" x2="340" y2="36" stroke="#30363d"/>

    <!-- Tab Actions label -->
    <text x="0" y="58" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="0.5">TAB ACTIONS</text>

    <!-- Row 1: Group / Ungroup -->
    <g transform="translate(0,66)">
      <rect width="164" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <g transform="translate(12,10)">
        <rect x="0" y="0" width="6" height="6" rx="1" fill="#e6edf3"/>
        <rect x="8" y="0" width="6" height="6" rx="1" fill="#e6edf3"/>
        <rect x="0" y="8" width="6" height="6" rx="1" fill="#e6edf3"/>
        <rect x="8" y="8" width="6" height="6" rx="1" fill="#e6edf3"/>
      </g>
      <text x="34" y="24" fill="#e6edf3" font-size="14" font-weight="500">Group</text>

      <g transform="translate(176,0)">
        <rect width="164" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
        <rect x="12" y="12" width="14" height="2" rx="1" fill="#e6edf3"/>
        <text x="34" y="24" fill="#e6edf3" font-size="14" font-weight="500">Ungroup</text>
      </g>
    </g>

    <!-- Row 2: Sort / Dedupe -->
    <g transform="translate(0,112)">
      <rect width="164" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <g transform="translate(12,10)">
        <line x1="0" y1="3" x2="14" y2="3" stroke="#e6edf3" stroke-width="2" stroke-linecap="round"/>
        <line x1="0" y1="9" x2="10" y2="9" stroke="#e6edf3" stroke-width="2" stroke-linecap="round"/>
        <line x1="0" y1="15" x2="6" y2="15" stroke="#e6edf3" stroke-width="2" stroke-linecap="round"/>
      </g>
      <text x="34" y="24" fill="#e6edf3" font-size="14" font-weight="500">Sort</text>

      <g transform="translate(176,0)">
        <rect width="164" height="38" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
        <g transform="translate(12,8)">
          <rect x="2" y="0" width="10" height="12" rx="1" fill="none" stroke="#e6edf3" stroke-width="1.5"/>
          <line x1="6" y1="14" x2="10" y2="18" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="14" x2="6" y2="18" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round"/>
        </g>
        <text x="34" y="24" fill="#e6edf3" font-size="14" font-weight="500">Dedupe</text>
      </g>
    </g>

    <!-- Divider -->
    <line x1="0" y1="164" x2="340" y2="164" stroke="#30363d"/>

    <!-- Session Keepalive label -->
    <text x="0" y="184" fill="#8b949e" font-size="11" font-weight="600" letter-spacing="0.5">SESSION KEEPALIVE</text>

    <!-- Protect button -->
    <g transform="translate(0,192)">
      <rect width="340" height="40" rx="6" fill="#238636"/>
      <g transform="translate(14,11)">
        <path d="M9 1L2 4v5c0 4.4 3 8.5 7 9.5 4-1 7-5.1 7-9.5V4L9 1z" fill="none" stroke="#fff" stroke-width="1.5"/>
      </g>
      <text x="38" y="26" fill="#fff" font-size="14" font-weight="500">Protect Current Site</text>
    </g>

    <!-- Ping Now button -->
    <g transform="translate(0,240)">
      <rect width="340" height="40" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1"/>
      <g transform="translate(14,11)">
        <path d="M14 2.5C11 1 8 1 5.5 2.5 3 4 2.5 7 4 9.5l-2 2L4.5 14l2-2c2.5 1.5 5.5 1 7.5-.5s2.5-4.5 1-7" fill="none" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round"/>
      </g>
      <text x="38" y="26" fill="#e6edf3" font-size="14" font-weight="500">Ping Now</text>
    </g>

    <!-- Site list -->
    <g transform="translate(0,290)">
      <!-- Site 1 -->
      <rect width="340" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <circle cx="16" cy="19" r="4" fill="#3fb950"/>
      <text x="28" y="23" fill="#e6edf3" font-size="13">github.com</text>
      <text x="296" y="23" fill="#8b949e" font-size="13" cursor="pointer">✕</text>

      <!-- Site 2 -->
      <g transform="translate(0,46)">
        <rect width="340" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <circle cx="16" cy="19" r="4" fill="#3fb950"/>
        <text x="28" y="23" fill="#e6edf3" font-size="13">mail.google.com</text>
        <text x="296" y="23" fill="#8b949e" font-size="13" cursor="pointer">✕</text>
      </g>

      <!-- Site 3 -->
      <g transform="translate(0,92)">
        <rect width="340" height="38" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <circle cx="16" cy="19" r="4" fill="#f0883e"/>
        <text x="28" y="23" fill="#e6edf3" font-size="13">slack.com</text>
        <text x="296" y="23" fill="#8b949e" font-size="13" cursor="pointer">✕</text>
      </g>
    </g>

    <!-- Settings -->
    <g transform="translate(0,428)">
      <text x="0" y="12" fill="#8b949e" font-size="13">Ping interval</text>
      <g transform="translate(270,0)">
        <rect width="70" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="12" y="16" fill="#e6edf3" font-size="13">5 min</text>
      </g>
    </g>
    <g transform="translate(0,458)">
      <text x="0" y="12" fill="#8b949e" font-size="13">Only if tab is open</text>
      <g transform="translate(306,1)">
        <rect width="16" height="16" rx="3" fill="#238636"/>
        <path d="M4 8l3 3 5-5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </g>
    </g>
  </g>
</svg>
