name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g web-ext
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./extension/manifest.json').version")" >> $GITHUB_OUTPUT
      - name: Build and sign
        run: |
          web-ext sign \
            --source-dir extension \
            --api-key "${{ secrets.AMO_API_KEY }}" \
            --api-secret "${{ secrets.AMO_API_SECRET }}" \
            --channel listed \
            --amo-metadata extension/amo-metadata.json \
            --timeout 900000
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          XPI=$(find web-ext-artifacts -name '*.xpi' 2>/dev/null | head -1)
          if [ -z "$XPI" ]; then
            XPI=$(find extension/web-ext-artifacts -name '*.xpi' 2>/dev/null | head -1)
          fi
          if [ -n "$XPI" ]; then
            gh release create "v${{ steps.version.outputs.version }}" "$XPI" \
              --title "v${{ steps.version.outputs.version }}" \
              --notes "Release v${{ steps.version.outputs.version }}" \
              --latest
          fi
