name: CI/CD

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g web-ext
      - name: Build and sign
        run: |
          web-ext sign \
            --source-dir extension \
            --api-key "${{ secrets.AMO_API_KEY }}" \
            --api-secret "${{ secrets.AMO_API_SECRET }}" \
            --channel listed \
            --amo-metadata extension/amo-metadata.json \
            --timeout 900000
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          XPI=$(find web-ext-artifacts -name '*.xpi' 2>/dev/null | head -1)
          if [ -z "$XPI" ]; then
            XPI=$(find extension/web-ext-artifacts -name '*.xpi' 2>/dev/null | head -1)
          fi
          if [ -n "$XPI" ]; then
            gh release create "$TAG" "$XPI" \
              --title "$TAG" \
              --notes "Release $TAG" \
              --latest
          fi
